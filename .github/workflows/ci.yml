name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          # 鎖 major 不鎖 patch（現行 LTS）
          node-version: '24'

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob globstar
          count=0
          for f in plugins/**/test-*.mjs; do
            echo "== $f"
            node "$f"
            count=$((count+1))
          done
          echo "ran $count test files"
          if [ "$count" -lt 1 ]; then
            echo "::error::glob 零命中——一個測試檔都沒跑到（防假綠斷言）"
            exit 1
          fi

      - name: skill-lint
        shell: bash
        run: node plugins/loops-workflow/scripts/skill-lint.mjs

      - name: codex-plugin-lint
        shell: bash
        # Tier A 機械 guard（#182）：驗 Codex 薄 adapter 必要欄位／雙 manifest 同步／
        # marketplace 零複製；--root . 用 repo root（M2）掃描，不是 plugin-local。
        run: node plugins/loops-workflow/scripts/codex-plugin-lint.mjs --root .

      - name: reviewer drift-check
        shell: bash
        # 21 個 reviewer/validator agent 檔由 gen-reviewers.mjs 從單一真相源重生；
        # 手改 agents/*.md 而非改真相源 → 此步紅（指出漂移檔 + 漂在哪塊）。
        run: node plugins/loops-workflow/scripts/gen-reviewers.mjs --check
